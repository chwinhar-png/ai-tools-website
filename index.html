            <aside class="space-y-8">

                        View Full Knowledge Base

                    Ad Slot (300x250)
                </div>
            </aside>
        </div>

    <footer class="mt-20 border-t border-white/10 py-16 text-center bg-[#010409]">
        <p id="footer-copy" class="text-slate-500 text-sm font-medium">© 2026 AI Navigator. All rights reserved. 讓 AI 觸手可及。</p>
        <p id="footer-sub" class="text-slate-600 text-xs mt-3 uppercase tracking-widest">Global Authority in AI Automation Matrix.</p>
    </footer>

    <script>
        const i18n = {
            zh: {
                siteTitle: "AI 導航王 | 2026 企業級 AI 自動化權威矩陣",
                siteDesc: "精選 2026 全球最強 AI 工具與企業自動化指南，涵蓋 OpenClaw 架設、私有化 AI 網關及高效工作流實戰。",
                navTools: "工具導航",
                navInfo: "權威專題",
                navSubmit: "提交工具",
                mainH1: "探索 AI 自動化的極致邊界",
                mainP: "精選 2026 年企業級 AI 工具與自動化架構指南，助您在數位轉型浪潮中建立核心競爭力。",
                newsTitle: "AI 自動化權威專題",
                viewMore: "探索完整知識庫",
                footerCopy: "© 2026 AI Navigator. 專業 AI 自動化與網關技術導航。",
                footerSub: "每日更新，致力於提升全球企業生產力。",
                categories: { all: "全部", llm: "語言模型", image: "影像生成", video: "視頻音頻", productivity: "生產力工具", coding: "代碼開發" },
                articles: [
                    { title: "1. 企業 AI 轉型戰略：為什麼私有化網關是核心路徑？", url: "articles/article-1-zh.html", status: "已發布" },
                    { title: "2. 深度解析 OpenClaw 技術結構：自動化調度原理", url: "articles/article-2-zh.html", status: "即將發布" },
                    { title: "3. 高效能 AI 環境配置：利用虛擬化容器打造穩定系統", url: "articles/article-3-zh.html", status: "即將發布" },
                    { title: "4. 語意快取技術：如何在商業環境中節省 50% 成本", url: "articles/article-4-zh.html", status: "即將發布" }
                ]
            },
            en: {
                siteTitle: "AI Navigator | 2026 Enterprise AI Automation Authority Matrix",
                siteDesc: "Premier directory for 2026 AI tools and enterprise automation guides, including OpenClaw and private AI gateways.",
                navTools: "Tools",
                navInfo: "Authority Series",
                navSubmit: "Submit",
                mainH1: "Explore the Frontiers of AI Automation",
                mainP: "Curated 2026 AI tools and architectural guides to empower your enterprise digital transformation.",
                newsTitle: "AI Automation Authority Series",
                viewMore: "Explore Full Knowledge Base",
                footerCopy: "© 2026 AI Navigator. Global Leader in AI Gateway Navigation.",
                footerSub: "Updated Daily. Empowering Productivity Worldwide.",
                categories: { all: "All", llm: "LLM", image: "Design", video: "Video/Audio", productivity: "Productivity", coding: "Coding" },
                articles: [
                    { title: "1. AI Strategy: Why Private Gateways are Essential", url: "articles/article-1-en.html", status: "Published" },
                    { title: "2. Deep Dive: OpenClaw Architecture & Routing", url: "articles/article-2-en.html", status: "Coming Soon" },
                    { title: "3. Infrastructure: Building Stable Systems via Docker", url: "articles/article-3-en.html", status: "Coming Soon" },
                    { title: "4. Semantic Caching: Reducing 50% Cost in Business", url: "articles/article-4-en.html", status: "Coming Soon" }
                ]
            }
        };

        const aiTools = [
            { name: "ChatGPT", desc_zh: "OpenAI 旗下的全能型 AI 助手，GPT-4o 驅動。", desc_en: "All-in-one AI assistant by OpenAI, powered by GPT-4o.", cat: "llm", icon: "message-circle", url: "#", color: "text-emerald-500", bg: "bg-emerald-500/10" },
            { name: "Claude 3.5", desc_zh: "Anthropic 推出，長文本理解與代碼能力極強。", desc_en: "Powerful LLM from Anthropic, excellent at coding and long-context understanding.", cat: "llm", icon: "brain", url: "#", color: "text-orange-400", bg: "bg-orange-400/10" },
            { name: "OpenClaw", desc_zh: "專為企業打造的私有化 AI Agent 網關解決方案。", desc_en: "Self-hosted AI Agent gateway solution built for enterprises.", cat: "productivity", icon: "shield", url: "#", color: "text-blue-400", bg: "bg-blue-400/10" },
            { name: "Midjourney", desc_zh: "頂級 AI 繪圖工具，以超寫實與藝術感著稱。", desc_en: "Top-tier AI image generator known for its photorealism and artistic style.", cat: "image", icon: "palette", url: "#", color: "text-indigo-400", bg: "bg-indigo-400/10" },
            { name: "Cursor", desc_zh: "基於 VS Code 的 AI IDE，能理解整個專案代碼庫。", desc_en: "AI-native code editor based on VS Code, understands your entire codebase.", cat: "coding", icon: "terminal", url: "#", color: "text-sky-300", bg: "bg-sky-300/10" }
        ];

        let currentLang = 'zh';
        let currentCategory = 'all';

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';

            document.getElementById('lang-zh').className = lang === 'zh' ? 'px-3 py-1 rounded-md text-xs font-bold bg-blue-600 text-white' : 'px-3 py-1 rounded-md text-xs font-bold text-slate-400 hover:text-white';
            document.getElementById('lang-en').className = lang === 'en' ? 'px-3 py-1 rounded-md text-xs font-bold bg-blue-600 text-white' : 'px-3 py-1 rounded-md text-xs font-bold text-slate-400 hover:text-white';

            const t = i18n[lang];
            document.getElementById('site-title').innerText = t.siteTitle;
            document.getElementById('site-desc').content = t.siteDesc;
            document.getElementById('nav-tools').innerText = t.navTools;
            document.getElementById('nav-info').innerText = t.navInfo;
            document.getElementById('nav-submit').innerText = t.navSubmit;
            document.getElementById('main-h1').innerText = t.mainH1;
            document.getElementById('main-p').innerText = t.mainP;
            document.getElementById('news-title').innerText = t.newsTitle;
            document.getElementById('view-more-btn').innerText = t.viewMore;
            document.getElementById('footer-copy').innerText = t.footerCopy;
            document.getElementById('footer-sub').innerText = t.footerSub;

            const catBar = document.getElementById('category-bar');
            catBar.innerHTML = Object.entries(t.categories).map(([key, value]) => `
                <button class="category-btn ${currentCategory === key ? 'active' : ''} px-5 py-2 rounded-full text-slate-300 hover:text-white text-sm transition font-semibold" onclick="filterTools('${key}', this)">${value}</button>
            `).join('');

            const articleList = document.getElementById('article-list');
            articleList.innerHTML = t.articles.map(art => `
                <li class="border-b border-white/5 pb-4">
                    <a href="${art.url}" class="group block">
                        <span class="status-pill ${art.status === '已發布' || art.status === 'Published' ? 'status-published' : 'status-upcoming'} block w-fit mb-2">${art.status}</span>
                        <span class="text-sm text-slate-300 group-hover:text-blue-400 transition leading-snug font-medium block">
                            ${art.title}
                        </span>
                    </a>
                </li>
            `).join('');

            renderTools();
        }

        function renderTools() {
            const grid = document.getElementById('tool-grid');
            const filtered = currentCategory === 'all' ? aiTools : aiTools.filter(t => t.cat === currentCategory);
            grid.innerHTML = filtered.map((tool, index) => {
                const card = `
                    <div class="tool-card glass p-7 rounded-3xl hover:border-blue-500/50 hover:-translate-y-1 transition-all duration-300 group">
                        <div class="flex items-start justify-between mb-5">
                            <div class="p-4 ${tool.bg} rounded-2xl ${tool.color} shadow-lg"><i data-lucide="${tool.icon}"></i></div>
                            <a href="${tool.url}" target="_blank" class="text-slate-500 hover:text-white transition"><i data-lucide="external-link" class="w-5 h-5"></i></a>
                        </div>
                        <h3 class="text-xl font-extrabold text-white mb-3 group-hover:text-blue-400 transition tracking-tight">${tool.name}</h3>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6 line-clamp-2">${currentLang === 'zh' ? tool.desc_zh : tool.desc_en}</p>
                        <div class="flex items-center"><span class="text-[10px] px-3 py-1.5 bg-slate-800 rounded-lg uppercase font-black text-slate-400 tracking-widest">${i18n[currentLang].categories[tool.cat]}</span></div>
                    </div>
                `;
                return card;
            }).join('');
            lucide.createIcons();
        }

        function filterTools(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTools();
        }

        setLanguage('zh');
    </script>
</body>
</html>
